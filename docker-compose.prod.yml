version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: apps/odonto-api/Dockerfile
    restart: always
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      NODE_ENV: production
    depends_on:
      - db
    networks:
      - internal
      - web

  front:
    build:
      context: .
      dockerfile: apps/odonto-front/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    networks:
      - web

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    restart: always
    networks:
      - web

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - front
      - landing
    networks:
      - web

networks:
  internal:
  web:

volumes:
  postgres_data:
